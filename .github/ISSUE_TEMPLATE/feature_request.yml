name: Feature request
description: Propose a new capability or improvement
labels: ["enhancement", "triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - mobile
        - service:identity
        - service:dietary
        - service:commerce
        - service:notification
        - service:ai
        - contracts
        - infra/CI
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user or business problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
