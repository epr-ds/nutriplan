version: 2
updates:
  # Mobile — Gradle (KMP)
  - package-ecosystem: "gradle"
    directory: "/mobile"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["dependencies", "mobile"]
    commit-message:
      prefix: "build(mobile)"

  # AI service — pip
  - package-ecosystem: "pip"
    directory: "/services/ai"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "service:ai"]
    commit-message:
      prefix: "build(ai)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"

  # Docker images (AI service)
  - package-ecosystem: "docker"
    directory: "/services/ai"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
