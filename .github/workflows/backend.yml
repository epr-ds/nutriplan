name: Backend CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/backend.yml'
  pull_request:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-service:
    name: AI service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Test (pytest)
        run: pytest

  identity-service:
    name: Identity service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/identity
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nutriplan
          POSTGRES_PASSWORD: nutriplan
          POSTGRES_DB: identity
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nutriplan -d identity"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      IDENTITY_DATABASE_URL: postgresql+psycopg://nutriplan:nutriplan@localhost:5432/identity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/identity/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Validate migrations (alembic upgrade)
        run: alembic upgrade head
      - name: Provider contract tests (vs OpenAPI)
        run: pytest tests/test_contract.py -q
      - name: Test (pytest)
        run: pytest --ignore=tests/test_contract.py
