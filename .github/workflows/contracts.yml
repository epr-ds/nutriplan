name: Contracts

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.spectral.yaml'
      - '.github/workflows/contracts.yml'
  pull_request:

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Spectral lint
        run: npx --yes @stoplight/spectral-cli@6 lint "contracts/*.openapi.yaml" --fail-severity error
