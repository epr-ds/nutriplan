name: Mobile CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'
  pull_request:

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
      - name: Build shared + Android app & run tests
        run: ./gradlew :shared:testDebugUnitTest :androidApp:assembleDebug --stacktrace
      - name: Static analysis (detekt)
        run: ./gradlew detekt --stacktrace

  ios-framework:
    name: iOS shared framework
    runs-on: macos-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
      - name: Link shared iOS framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --stacktrace
