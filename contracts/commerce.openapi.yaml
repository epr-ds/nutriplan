openapi: 3.0.3
info:
  title: NutriPlan Commerce API
  version: 1.0.0
  description: |
    Orders, fulfillment (dark kitchen / grocery), and payments for the NutriPlan Commerce
    bounded context. Currency defaults to MXN; payment methods include cards, PayPal, OXXO,
    and SPEI.
  contact:
    name: NutriPlan Team
    url: https://github.com/epr-ds/nutriplan
  license:
    name: Proprietary
    url: https://github.com/epr-ds/nutriplan/blob/main/LICENSE
servers:
  - url: https://api.nutriplan.app/commerce/v1
    description: Production
  - url: http://localhost:8083
    description: Local development
tags:
  - name: Orders
  - name: Fulfillment

paths:
  /orders:
    post:
      tags: [Orders]
      operationId: createOrder
      summary: Create an order from a meal plan
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    get:
      tags: [Orders]
      operationId: listOrders
      summary: List the current user's orders
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, preparing, in_transit, delivered, cancelled]
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /orders/{orderId}:
    get:
      tags: [Orders]
      operationId: getOrder
      summary: Get order details
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{orderId}/cancel:
    post:
      tags: [Orders]
      operationId: cancelOrder
      summary: Cancel an order
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /fulfillment/dark-kitchen/availability:
    get:
      tags: [Fulfillment]
      operationId: getDarkKitchenAvailability
      summary: Check dark-kitchen availability
      security:
        - BearerAuth: []
      parameters:
        - name: zipCode
          in: query
          required: true
          schema:
            type: string
        - name: deliveryDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Availability information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'

  /fulfillment/grocery/search:
    post:
      tags: [Fulfillment]
      operationId: searchGroceryProducts
      summary: Search products across grocery providers
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrocerySearchRequest'
      responses:
        '200':
          description: Search results across providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProviderResponse'

  /fulfillment/grocery/providers:
    get:
      tags: [Fulfillment]
      operationId: listGroceryProviders
      summary: List available grocery providers
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Provider list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProviderResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Authentication is required, or the bearer token is missing/invalid
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: >-
        The order does not exist, or is not visible to the caller. An order owned by a
        different user is deliberately reported as not found (no existence/ownership leak).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: >-
        The request conflicts with existing state: an illegal order transition, or an
        `Idempotency-Key` reused with a different request body (COM-209).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnprocessableEntity:
      description: >-
        The request was well-formed but failed validation or a domain precondition. Validation
        failures additionally carry a machine-readable `errors` array.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  parameters:
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: >-
        Optional client-generated key that makes create-order safe to retry (COM-209). A repeat with
        the same key returns the original order without creating or charging again; the same key with
        a different body is a 409.
      schema:
        type: string
        maxLength: 255

  schemas:
    CreateOrderRequest:
      type: object
      required: [mealPlanId, fulfillmentType, deliveryAddress, deliveryDate, deliveryTimeSlot]
      properties:
        mealPlanId:
          type: string
          format: uuid
        fulfillmentType:
          type: string
          enum: [dark_kitchen, grocery_delivery, pickup]
        providerId:
          type: string
          description: Required for grocery_delivery (e.g., freshbasket, walmart, chedraui)
        deliveryAddress:
          $ref: '#/components/schemas/AddressRequest'
        deliveryDate:
          type: string
          format: date
        deliveryTimeSlot:
          type: string
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethodRequest'
        notes:
          type: string

    AddressRequest:
      type: object
      required: [street, city, state, zipCode, country]
      properties:
        street:
          type: string
        apartment:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
        country:
          type: string
        instructions:
          type: string

    PaymentMethodRequest:
      type: object
      required: [type, token]
      properties:
        type:
          type: string
          enum: [credit_card, debit_card, paypal, oxxo, spei]
        token:
          type: string

    OrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, confirmed, preparing, in_transit, delivered, cancelled]
        fulfillmentType:
          type: string
          enum: [dark_kitchen, grocery_delivery, pickup]
        provider:
          $ref: '#/components/schemas/ProviderResponse'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemResponse'
        subtotal:
          $ref: '#/components/schemas/MoneyResponse'
        deliveryFee:
          $ref: '#/components/schemas/MoneyResponse'
        total:
          $ref: '#/components/schemas/MoneyResponse'
        estimatedDelivery:
          type: string
          format: date-time
        trackingUrl:
          type: string
          format: uri
        voucher:
          $ref: '#/components/schemas/VoucherResponse'

    VoucherResponse:
      type: object
      description: >
        Offline payment voucher (OXXO) issued for an asynchronous payment. Present only for a
        voucher method; the order stays `pending` until the provider confirms settlement via a
        webhook. The customer pays `amount` using `reference` before `expiresAt`.
      properties:
        reference:
          type: string
        amount:
          $ref: '#/components/schemas/MoneyResponse'
        expiresAt:
          type: string
          format: date-time
        provider:
          type: string
        barcodeUrl:
          type: string
          format: uri

    OrderItemResponse:
      type: object
      properties:
        name:
          type: string
        quantity:
          type: number
        unit:
          type: string
        unitPrice:
          $ref: '#/components/schemas/MoneyResponse'
        lineTotal:
          $ref: '#/components/schemas/MoneyResponse'

    GrocerySearchRequest:
      type: object
      required: [items, zipCode]
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              ingredient:
                type: string
              quantity:
                type: number
              unit:
                type: string
        providers:
          type: array
          items:
            type: string
        zipCode:
          type: string

    AvailabilityResponse:
      type: object
      properties:
        available:
          type: boolean
        zipCode:
          type: string
        timeSlots:
          type: array
          items:
            type: string

    MoneyResponse:
      type: object
      properties:
        amount:
          type: number
        currency:
          type: string
          default: MXN
        formatted:
          type: string

    ProviderResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [dark_kitchen, grocery]
        logoUrl:
          type: string
          format: uri
        estimatedDelivery:
          type: string

    Problem:
      type: object
      description: |
        RFC 7807 problem detail returned as `application/problem+json` for every 4xx/5xx
        error (COM-108). Additional members (e.g. `errors` for validation failures) may be present.
      required: [type, title, status]
      properties:
        type:
          type: string
          description: A URI reference identifying the problem type (`about:blank` by default)
        title:
          type: string
          description: A short, human-readable summary of the problem type
        status:
          type: integer
          description: The HTTP status code
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence
        instance:
          type: string
          description: A URI reference identifying the specific occurrence (the request path)
