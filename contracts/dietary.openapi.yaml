openapi: 3.0.3
info:
  title: NutriPlan Dietary Planning API
  version: 1.0.0
  description: |
    Meal plans, recipes, nutrition calculation, and AI-assisted recommendations for the
    NutriPlan Dietary Planning bounded context.
  contact:
    name: NutriPlan Team
    url: https://github.com/epr-ds/nutriplan
  license:
    name: Proprietary
    url: https://github.com/epr-ds/nutriplan/blob/main/LICENSE
servers:
  - url: https://api.nutriplan.app/dietary/v1
    description: Production
  - url: http://localhost:8082
    description: Local development
tags:
  - name: MealPlans
  - name: AI
  - name: Recipes

paths:
  /meal-plans:
    post:
      tags: [MealPlans]
      operationId: createMealPlan
      summary: Create a new meal plan
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMealPlanRequest'
      responses:
        '201':
          description: Meal plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealPlanResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    get:
      tags: [MealPlans]
      operationId: listMealPlans
      summary: List the current user's meal plans
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, completed, saved]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Meal plans list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MealPlanSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /meal-plans/{planId}:
    get:
      tags: [MealPlans]
      operationId: getMealPlan
      summary: Get a specific meal plan
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PlanId'
      responses:
        '200':
          description: Meal plan details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealPlanResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [MealPlans]
      operationId: updateMealPlanStatus
      summary: Change a meal plan's lifecycle status
      description: >-
        Transition a meal plan through its lifecycle (draft → active → completed/saved).
        Allowed transitions are enforced server-side: an illegal transition returns 409,
        and activating a plan requires it to have at least one meal.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PlanId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMealPlanStatusRequest'
      responses:
        '200':
          description: Updated meal plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealPlanResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /meal-plans/{planId}/meals:
    post:
      tags: [MealPlans]
      operationId: addMealToPlan
      summary: Add a meal to a plan
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PlanId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMealRequest'
      responses:
        '201':
          description: Meal added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /ai/recommendations:
    post:
      tags: [AI]
      operationId: getAIRecommendations
      summary: Get AI-powered recipe recommendations
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIRecommendationRequest'
      responses:
        '200':
          description: AI recommendations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIRecommendationResponse'

  /ai/analyze-meal:
    post:
      tags: [AI]
      operationId: analyzeMeal
      summary: Analyze the nutritional content of a meal
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeMealRequest'
      responses:
        '200':
          description: Nutritional analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionalAnalysisResponse'

  /ai/optimize-plan:
    post:
      tags: [AI]
      operationId: optimizePlan
      summary: Optimize a meal plan toward its goals
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizePlanRequest'
      responses:
        '200':
          description: Optimized plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealPlanResponse'

  /recipes:
    get:
      tags: [Recipes]
      operationId: searchRecipes
      summary: Search recipes
      security:
        - BearerAuth: []
      parameters:
        - name: ingredients
          in: query
          schema:
            type: array
            items:
              type: string
        - name: dietType
          in: query
          schema:
            type: string
            enum: [omnivore, vegetarian, vegan, keto, paleo]
        - name: maxCalories
          in: query
          schema:
            type: integer
            minimum: 0
        - name: minProtein
          in: query
          schema:
            type: number
            minimum: 0
        - name: page
          in: query
          description: 1-based page number for offset pagination.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Maximum number of recipes to return per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Recipe search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecipeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Authentication is required, or the bearer token is missing/invalid
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: >-
        The meal plan does not exist, or is not visible to the caller. A plan owned by a
        different user is deliberately reported as not found (no existence/ownership leak).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: The request conflicts with the resource's current state (e.g. an illegal transition)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnprocessableEntity:
      description: >-
        The request was well-formed but failed validation or a domain precondition. Validation
        failures additionally carry a machine-readable `errors` array.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  parameters:
    PlanId:
      name: planId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CreateMealPlanRequest:
      type: object
      required: [name, startDate, endDate, dailyCalorieTarget]
      properties:
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        dailyCalorieTarget:
          type: integer
        macroTargets:
          $ref: '#/components/schemas/MacroTargets'
        dietaryType:
          type: string
          enum: [omnivore, vegetarian, vegan, keto, paleo]

    AddMealRequest:
      type: object
      required: [mealType, recipeId, servings]
      properties:
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack]
        recipeId:
          type: string
        servings:
          type: number
          format: float

    UpdateMealPlanStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, completed, saved]
          description: >-
            Target lifecycle status. A plan can never be moved back to draft; whether a
            specific transition is permitted depends on the plan's current status.

    MealPlanSummaryResponse:
      type: object
      required: [id, name, startDate, endDate, status]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [draft, active, completed, saved]

    MealPlanResponse:
      type: object
      required: [id, name, startDate, endDate, dailyCalorieTarget, status, meals, nutritionalSummary]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        dailyCalorieTarget:
          type: integer
        meals:
          type: array
          items:
            $ref: '#/components/schemas/MealResponse'
        nutritionalSummary:
          $ref: '#/components/schemas/NutritionalSummary'
        status:
          type: string
          enum: [draft, active, completed, saved]

    MealResponse:
      type: object
      required: [id, mealType, servings]
      properties:
        id:
          type: string
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack]
        recipe:
          description: >-
            The full recipe, embedded only on the add-meal response. Plan reads
            (list and detail) do not expand the recipe and return null here.
          anyOf:
            - $ref: '#/components/schemas/RecipeResponse'
            - type: object
              nullable: true
              maxProperties: 0
        servings:
          type: number
        nutritionalInfo:
          $ref: '#/components/schemas/NutritionalInfo'

    RecipeResponse:
      type: object
      required: [id, name, servings, ingredients, instructions, dietaryTypes]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/IngredientResponse'
        instructions:
          type: array
          items:
            type: string
        prepTime:
          type: integer
        cookTime:
          type: integer
        servings:
          type: integer
        imageUrl:
          type: string
          format: uri
        nutritionalInfo:
          $ref: '#/components/schemas/NutritionalInfo'
        dietaryTypes:
          type: array
          items:
            type: string
            enum: [omnivore, vegetarian, vegan, keto, paleo]

    IngredientResponse:
      type: object
      required: [name]
      properties:
        name:
          type: string
        quantity:
          type: number
        unit:
          type: string
        calories:
          type: integer
        protein:
          type: number
        carbs:
          type: number
        fat:
          type: number
        sugar:
          type: number

    NutritionalInfo:
      description: >-
        A bundle of nutrient values. Nullable as a whole (a meal may carry no
        nutrition yet) and per nutrient: a null nutrient means "unknown / not
        measured", which is kept distinct from a measured zero.
      type: object
      nullable: true
      properties:
        calories:
          type: integer
          nullable: true
        protein:
          type: number
          nullable: true
        carbs:
          type: number
          nullable: true
        fat:
          type: number
          nullable: true
        sugar:
          type: number
          nullable: true

    NutritionalSummary:
      type: object
      required: [total, dailyAverage, targets]
      properties:
        total:
          $ref: '#/components/schemas/NutritionalInfo'
        dailyAverage:
          $ref: '#/components/schemas/NutritionalInfo'
        targets:
          $ref: '#/components/schemas/NutritionalTargets'

    NutritionalTargets:
      description: >-
        A plan's nutrition goals: its daily calorie target plus optional macro
        gram targets. Distinct from MacroTargets (the create-request input) in
        that it also carries the calorie target. A null macro means no target was
        set for that nutrient.
      type: object
      properties:
        calories:
          type: integer
          nullable: true
        protein:
          type: integer
          nullable: true
        carbs:
          type: integer
          nullable: true
        fat:
          type: integer
          nullable: true
        sugar:
          type: integer
          nullable: true

    AIRecommendationRequest:
      type: object
      required: [context]
      properties:
        context:
          type: string
          enum: [meal_plan, single_meal, ingredient_based]
        dietaryPreferences:
          $ref: '#/components/schemas/DietaryPreferencesRequest'
        availableIngredients:
          type: array
          items:
            type: string
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack]
        calorieTarget:
          type: integer
        previousMeals:
          type: array
          items:
            type: string
        constraints:
          type: array
          items:
            type: string
        language:
          type: string
          default: es

    AIRecommendationResponse:
      type: object
      properties:
        recommendations:
          type: array
          items:
            $ref: '#/components/schemas/RecipeResponse'
        reasoning:
          type: string
        nutritionalAlignment:
          $ref: '#/components/schemas/NutritionalAlignment'
        disclaimer:
          type: string
          description: Medical disclaimer attached to every AI response (AIA-505)

    NutritionalAlignment:
      type: object
      properties:
        score:
          type: number
        details:
          type: string

    AnalyzeMealRequest:
      type: object
      required: [description]
      properties:
        description:
          type: string
          description: Free-text or structured description of the meal
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/IngredientResponse'

    NutritionalAnalysisResponse:
      type: object
      properties:
        nutritionalInfo:
          $ref: '#/components/schemas/NutritionalInfo'
        alignment:
          $ref: '#/components/schemas/NutritionalAlignment'
        warnings:
          type: array
          items:
            type: string
        disclaimer:
          type: string
          description: Medical disclaimer attached to every AI response (AIA-505)

    OptimizePlanRequest:
      type: object
      required: [planId]
      properties:
        planId:
          type: string
          format: uuid
        goal:
          type: string
          enum: [balance_macros, increase_protein, reduce_calories, increase_satisfaction]

    DietaryPreferencesRequest:
      type: object
      properties:
        dietType:
          type: string
          enum: [omnivore, vegetarian, vegan, keto, paleo, mediterranean]
        allergies:
          type: array
          items:
            type: string
        dailyCalorieTarget:
          type: integer
          minimum: 1200
          maximum: 5000
        macroTargets:
          $ref: '#/components/schemas/MacroTargets'
        excludedIngredients:
          type: array
          items:
            type: string
        cuisinePreferences:
          type: array
          items:
            type: string

    MacroTargets:
      type: object
      properties:
        proteinGrams:
          type: integer
        carbsGrams:
          type: integer
        fatGrams:
          type: integer
        sugarGrams:
          type: integer

    Problem:
      type: object
      description: |
        RFC 7807 problem detail returned as `application/problem+json` for every 4xx/5xx
        error (DPL-108). Additional members (e.g. `errors` for validation failures) may be present.
      required: [type, title, status]
      properties:
        type:
          type: string
          description: A URI reference identifying the problem type (`about:blank` by default)
        title:
          type: string
          description: A short, human-readable summary of the problem type
        status:
          type: integer
          description: The HTTP status code
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence
        instance:
          type: string
          description: A URI reference identifying the specific occurrence (the request path)
