openapi: 3.0.3
info:
  title: NutriPlan Identity API
  version: 1.0.0
  description: |
    Authentication, OAuth, user profile, and dietary-preference management for the
    NutriPlan Identity bounded context.
  contact:
    name: NutriPlan Team
    url: https://github.com/epr-ds/nutriplan
  license:
    name: Proprietary
    url: https://github.com/epr-ds/nutriplan/blob/main/LICENSE
servers:
  - url: https://api.nutriplan.app/identity/v1
    description: Production
  - url: http://localhost:8081
    description: Local development
tags:
  - name: Auth
    description: Registration, login, and OAuth
  - name: Users
    description: Profile and preferences

paths:
  /auth/register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email already registered
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /auth/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: Login with credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /auth/oauth/{provider}:
    post:
      tags: [Auth]
      operationId: loginWithOAuth
      summary: Login via an OAuth provider
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, facebook, apple]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthRequest'
      responses:
        '200':
          description: OAuth authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Exchange a refresh token for a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /users/me:
    get:
      tags: [Users]
      operationId: getCurrentUser
      summary: Get the current user profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
    put:
      tags: [Users]
      operationId: updateCurrentUser
      summary: Update profile and preferences
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'

  /users/me/dietary-preferences:
    put:
      tags: [Users]
      operationId: updateDietaryPreferences
      summary: Update dietary preferences
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DietaryPreferencesRequest'
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DietaryPreferencesRequest'

  /users/me/avatar-upload-url:
    post:
      tags: [Users]
      operationId: createAvatarUploadUrl
      summary: Request a presigned URL to upload a new avatar (IDN-304)
      description: |
        Returns a short-lived presigned `PUT` URL the client uploads the image bytes to
        directly (object storage). After a successful upload, confirm via `PUT /users/me/avatar`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarUploadRequest'
      responses:
        '200':
          description: Presigned upload target
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUploadResponse'

  /users/me/avatar:
    put:
      tags: [Users]
      operationId: setUserAvatar
      summary: Confirm an uploaded avatar and set it on the profile (IDN-304)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarConfirmRequest'
      responses:
        '200':
          description: Avatar applied to the profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '403':
          description: The object key does not belong to the authenticated user
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          minLength: 2

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    OAuthRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
          description: Provider-issued identity token
        nonce:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Access-token lifetime in seconds
        user:
          $ref: '#/components/schemas/UserProfileResponse'

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        avatarUrl:
          type: string
          format: uri

    AvatarUploadRequest:
      type: object
      required: [contentType]
      properties:
        contentType:
          type: string
          description: MIME type of the image to upload
          enum: [image/jpeg, image/png, image/webp]

    AvatarUploadResponse:
      type: object
      required: [uploadUrl, key, expiresIn, requiredHeaders]
      properties:
        uploadUrl:
          type: string
          format: uri
          description: Presigned PUT URL the client uploads the image bytes to
        key:
          type: string
          description: Object key to pass back to PUT /users/me/avatar after upload
        expiresIn:
          type: integer
          description: Lifetime of the presigned URL in seconds
        requiredHeaders:
          type: object
          additionalProperties:
            type: string
          description: Headers the client must send with the upload PUT (e.g. Content-Type)

    AvatarConfirmRequest:
      type: object
      required: [key]
      properties:
        key:
          type: string
          description: The object key returned by createAvatarUploadUrl

    UserProfileResponse:
      type: object
      required: [id, email, name, avatarUrl, dietaryPreferences, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        dietaryPreferences:
          $ref: '#/components/schemas/DietaryPreferencesRequest'
        createdAt:
          type: string
          format: date-time

    DietaryPreferencesRequest:
      type: object
      nullable: true
      properties:
        dietType:
          type: string
          nullable: true
          enum: [omnivore, vegetarian, vegan, keto, paleo, mediterranean]
        allergies:
          type: array
          nullable: true
          items:
            type: string
        dailyCalorieTarget:
          type: integer
          nullable: true
          minimum: 1200
          maximum: 5000
        macroTargets:
          $ref: '#/components/schemas/MacroTargets'
        excludedIngredients:
          type: array
          nullable: true
          items:
            type: string
        cuisinePreferences:
          type: array
          nullable: true
          items:
            type: string
            enum: [mexican, italian, asian, mediterranean, american, indian]
        appetiteSatisfactionLevel:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5

    MacroTargets:
      type: object
      nullable: true
      properties:
        proteinGrams:
          type: integer
          nullable: true
        carbsGrams:
          type: integer
          nullable: true
        fatGrams:
          type: integer
          nullable: true
        sugarGrams:
          type: integer
          nullable: true

    Problem:
      type: object
      description: |
        RFC 7807 problem detail returned as `application/problem+json` for every 4xx/5xx
        error (IDN-106). Additional members (e.g. `errors` for validation failures) may be present.
      required: [type, title, status]
      properties:
        type:
          type: string
          description: A URI reference identifying the problem type (`about:blank` by default)
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
