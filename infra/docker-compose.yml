name: nutriplan

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nutriplan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutriplan}
      POSTGRES_DB: ${POSTGRES_DB:-nutriplan}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nutriplan} -d ${POSTGRES_DB:-nutriplan}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-nutriplan}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-nutriplan}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-nutriplan}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-nutriplan-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the avatars bucket and make objects publicly readable (dev only).
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_USER:-nutriplan} ${MINIO_PASSWORD:-nutriplan-secret} &&
      mc mb --ignore-existing local/${AVATAR_BUCKET:-avatars} &&
      mc anonymous set download local/${AVATAR_BUCKET:-avatars}
      "
    restart: "no"

  ai:
    build:
      context: ../services/ai
    environment:
      AI_ENVIRONMENT: development
      AI_LLM_API_KEY: ${AI_LLM_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      - redis

  identity:
    build:
      context: ../services/identity
      target: runtime
    environment:
      IDENTITY_ENVIRONMENT: development
      IDENTITY_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nutriplan}:${POSTGRES_PASSWORD:-nutriplan}@postgres:5432/identity
      # Presigned URLs are signed for a client-reachable endpoint (the host), not minio:9000.
      IDENTITY_S3_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      IDENTITY_S3_ACCESS_KEY: ${MINIO_USER:-nutriplan}
      IDENTITY_S3_SECRET_KEY: ${MINIO_PASSWORD:-nutriplan-secret}
      IDENTITY_AVATAR_BUCKET: ${AVATAR_BUCKET:-avatars}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8081"]

  # One-shot test runner (Postgres-backed). Run with: docker compose --profile test run --rm identity-test
  identity-test:
    build:
      context: ../services/identity
      target: test
    environment:
      IDENTITY_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nutriplan}:${POSTGRES_PASSWORD:-nutriplan}@postgres:5432/identity_test
    volumes:
      # The OpenAPI contract lives outside the build context; mount it so the provider
      # contract tests (tests/test_contract.py) run here instead of skipping.
      - ../contracts:/contracts:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["test"]
    command: ["pytest", "-q"]

  dietary:
    build:
      context: ../services/dietary
      target: runtime
    environment:
      DIETARY_ENVIRONMENT: development
      DIETARY_MONGO_URL: mongodb://${MONGO_USER:-nutriplan}:${MONGO_PASSWORD:-nutriplan}@mongo:27017/?authSource=admin
      DIETARY_MONGO_DB: ${DIETARY_MONGO_DB:-dietary}
    ports:
      - "8082:8082"
    depends_on:
      mongo:
        condition: service_healthy

  # One-shot test runner (MongoDB-backed). Run with: docker compose --profile test run --rm dietary-test
  dietary-test:
    build:
      context: ../services/dietary
      target: test
    environment:
      DIETARY_MONGO_URL: mongodb://${MONGO_USER:-nutriplan}:${MONGO_PASSWORD:-nutriplan}@mongo:27017/?authSource=admin
      DIETARY_MONGO_DB: dietary_test
    volumes:
      # The OpenAPI contract lives outside the build context; mount it so the provider
      # contract tests (tests/test_contract.py) run here instead of skipping.
      - ../contracts:/contracts:ro
    depends_on:
      mongo:
        condition: service_healthy
    profiles: ["test"]
    command: ["pytest", "-q"]

volumes:
  postgres-data:
  mongo-data:
  minio-data:
